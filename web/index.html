  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAFAF7;
      --surface: #FFFFFF;
      --border: #EAEAE5;
      --border-hover: #D8D8D2;
      --accent: #1B3A57;
      --green: #2F7D5B;
      --amber: #B8923A;
      --orange: #C2602E;
      --red: #A4332B;
      --subtle: #F7F6F1;
      --text-primary: #1a1a1a;
      --text-secondary: #374151;
      --text-muted: #6b7280;
      --text-faint: #9ca3af;
    }

    html, body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.55;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .mono { font-family: 'JetBrains Mono', monospace; }
    .caps { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; font-weight: 500; }

    /* Focus ring */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Slide-over backdrop */
    .backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.18);
      z-index: 50;
      animation: fadeIn .15s ease;
    }
    .slide-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 480px;
      background: white;
      border-left: 1px solid var(--border);
      z-index: 51;
      display: flex; flex-direction: column;
      animation: slideIn .22s cubic-bezier(.22,1,.36,1);
    }
    @media (max-width: 768px) {
      .slide-panel { width: 100%; border-left: none; }
    }
    @keyframes slideIn { from { transform: translateX(480px); } to { transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Evidence rows */
    @keyframes evidenceIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Count-up */
    @keyframes countUp { from { opacity: 0; } to { opacity: 1; } }

    /* Bar segment */
    @keyframes barGrow { from { width: 0 !important; } to {} }

    button { font-family: inherit; cursor: pointer; }
    a { font-family: inherit; }

    /* Responsive */
    @media (max-width: 1024px) { .content-col { padding: 24px 16px 80px !important; } }
    @media (max-width: 768px) {
      .claim-header { flex-direction: column !important; align-items: flex-start !important; }

    }
  </style>
</head>

function getBand(score) {
  if (score >= 80) return "green";
  if (score >= 60) return "amber";
  if (score >= 40) return "orange";
  return "red";
}
function bandColor(band) {
  return { green:"#2F7D5B", amber:"#B8923A", orange:"#C2602E", red:"#A4332B" }[band];
}
function scoreColor(score) { return bandColor(getBand(score)); }
function verdict(score) {
  if (score >= 80) return "WELL SUPPORTED";
  if (score >= 60) return "MODERATELY SUPPORTED";
  if (score >= 40) return "PARTIALLY SUPPORTED";
  return "DISPUTED";
}
function stanceColor(stance) {
  return { supporting:"#2F7D5B", contradicting:"#A4332B", neutral:"#9ca3af" }[stance];
}

function CountUp({ target, duration = 800 }) {
  const [val, setVal] = useState(0);
  const raf = useRef(null);
  useEffect(() => {
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - (1-t)*(1-t);
      setVal(Math.round(ease * target));
      if (t < 1) raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [target, duration]);
  return val;
}

function SummaryBar({ claims }) {
  const overall = Math.round(claims.reduce((s,c) => s + c.confidence, 0) / claims.length);
  const total = claims.length;
  const bands = [
    { color:"#2F7D5B", count: claims.filter(c => c.confidence >= 80).length },
    { color:"#B8923A", count: claims.filter(c => c.confidence >= 60 && c.confidence < 80).length },
    { color:"#C2602E", count: claims.filter(c => c.confidence >= 40 && c.confidence < 60).length },
    { color:"#A4332B", count: claims.filter(c => c.confidence < 40).length },
  ].filter(b => b.count > 0);

  const displayScore = CountUp({ target: overall });

  return (
    <div style={{
      background:"white", border:"1px solid var(--border)", borderRadius:10,
      height:64, display:"flex", alignItems:"center", gap:20, padding:"0 24px",
    }}>
      <div className="mono" style={{ fontSize:36, lineHeight:1, color:scoreColor(overall), fontWeight:500, flexShrink:0 }}>
        {displayScore}<span style={{ fontSize:18, marginLeft:2 }}>%</span>
      </div>
      <div style={{ flex:1 }}>
        <div style={{ display:"flex", height:4, borderRadius:9999, overflow:"hidden", background:"#EAEAE5", marginBottom:8 }}>
          {bands.map((b,i) => (
            <div key={b.color} style={{
              width:`${(b.count/total)*100}%`, height:"100%", background:b.color,
              animation:`barGrow .4s ${i*.08}s ease both`,
            }} />
          ))}
        </div>
        <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
          {[
            { color:"#2F7D5B", label:"High confidence", fn: c => c.confidence >= 80 },
            { color:"#B8923A", label:"Moderate", fn: c => c.confidence >= 60 && c.confidence < 80 },
            { color:"#C2602E", label:"Low", fn: c => c.confidence >= 40 && c.confidence < 60 },
            { color:"#A4332B", label:"Disputed", fn: c => c.confidence < 40 },
          ].map(({ color, label, fn }) => {
            const n = claims.filter(fn).length;
            if (!n) return null;
            return (
              <span key={color} style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:"var(--text-muted)" }}>

              </span>
            );
          })}
        </div>
      </div>
      <div className="caps" style={{ color:"var(--text-muted)", flexShrink:0 }}>{verdict(overall)}</div>
    </div>
  );
}

    </div>

}

function EvidenceRow({ ev, idx }) {
  const [showMore, setShowMore] = useState(false);
  const MAX = 220;
  const long = ev.excerpt.length > MAX;
  const display = long && !showMore ? ev.excerpt.slice(0, MAX) + "…" : ev.excerpt;

  return (
    <div style={{
      display:"flex",
      borderBottom:"1px solid #F3F3EF",
      animation:`evidenceIn .15s ${idx*.06}s ease both`,
    }}>
      <div style={{ width:4, background:stanceColor(ev.stance), flexShrink:0 }} />
      <div style={{ flex:1, padding:"12px 16px 12px 12px" }}>
        <div className="mono caps" style={{ color:"var(--text-muted)", marginBottom:6 }}>{ev.source}</div>
        <p style={{ fontSize:14, color:"var(--text-secondary)", fontStyle:"italic", lineHeight:1.6 }}>
          {display}
          {long && (
            <button onClick={() => setShowMore(!showMore)} style={{
              marginLeft:4, color:"var(--accent)", background:"none", border:"none",
              fontSize:13, fontStyle:"normal", fontFamily:"inherit",
            }}>{showMore ? "Show less" : "Read more"}</button>

        </p>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:10 }}>

            onMouseLeave={e => e.target.style.textDecoration="none"}>

    </div>
  );
}

function ClaimCard({ claim }) {
  const band = getBand(claim.confidence);
  const color = bandColor(band);
  const [expanded, setExpanded] = useState(claim.confidence < 70);
  const [hovered, setHovered] = useState(false);

  const parts = [
    claim.supporting > 0 && `${claim.supporting} supporting`,
    claim.contradicting > 0 && `${claim.contradicting} contradicting`,
    claim.neutral > 0 && `${claim.neutral} context`,
  ].filter(Boolean).join(" · ");

  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background:"white", borderRadius:10,
        border:`1px solid ${hovered ? "var(--border-hover)" : "var(--border)"}`,
        boxShadow: hovered ? "0 1px 3px rgba(0,0,0,.04)" : "none",
        transition:"border-color .12s, box-shadow .12s",
      }}
    >
      {/* Header */}
      <div className="claim-header" style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"14px 16px", minHeight:48 }}>
        <span className="mono" style={{ fontSize:11, color:"var(--text-faint)", letterSpacing:".06em", flexShrink:0, paddingTop:1 }}>
          CLAIM {String(claim.index).padStart(2,"0")}
        </span>
        <p style={{ flex:1, fontSize:15, color:"var(--text-primary)", margin:0, lineHeight:1.55 }}>
          {claim.text}
        </p>
        <div className="conf-chip mono" style={{
          height:28, padding:"0 12px", borderRadius:9999, flexShrink:0,
          background: color + "14", border:`1px solid ${color}33`,
          fontSize:13, color, display:"flex", alignItems:"center", whiteSpace:"nowrap", paddingTop:1,
        }} aria-label={`${claim.confidence}% confidence`}>
          {claim.confidence}% confidence
        </div>
      </div>

      {/* Divider */}
      <div style={{ height:1, background:"#EFEFEA" }} />

      {/* Toggle */}
      <button
        onClick={() => setExpanded(!expanded)}
        aria-expanded={expanded}
        style={{
          width:"100%", height:40, display:"flex", alignItems:"center", gap:8, padding:"0 16px",
          background:"none", border:"none", textAlign:"left", color:"var(--text-secondary)",
        }}
      >
        <span style={{
          display:"inline-block", fontSize:12, color:"var(--text-faint)",
          transition:"transform .2s", transform: expanded ? "rotate(90deg)" : "rotate(0deg)",
        }}>▸</span>
        <span className="mono" style={{ fontSize:13 }}>{parts || "No sources"}</span>
      </button>

      {/* Evidence */}
      {expanded && (
        <div style={{ borderTop:"1px solid #EFEFEA" }}>
          {claim.evidence.map((ev, i) => (
            <EvidenceRow key={ev.id} ev={ev} idx={i} />
          ))}
        </div>
      )}

      {/* Uncertainty footnote */}
      {claim.uncertainty && claim.confidence < 60 && (
        <div style={{
          background:"var(--subtle)", padding:"10px 16px",
          borderTop:"1px solid #EFEFEA",
          borderRadius:"0 0 10px 10px",
        }}>
          <span className="caps" style={{ color:"var(--text-faint)", display:"block", marginBottom:4 }}>Why this is uncertain:</span>
          <p style={{ fontSize:13, color:"var(--text-muted)", margin:0, lineHeight:1.55 }}>
            {claim.uncertainty}
          </p>
        </div>
      )}
    </div>
  );
}

function NoteSlideOver({ open, onClose, claims }) {
  useEffect(() => {
    const fn = e => { if (e.key === "Escape") onClose(); };
    if (open) document.addEventListener("keydown", fn);
    return () => document.removeEventListener("keydown", fn);
  }, [open, onClose]);

  if (!open) return null;

  const paragraphs = [
    { text:"Acme Capital — Q3 2026 Growth Memo", heading:true },
    { text:"Executive Summary" },
    { claimIdx:0, after:" The business continues to execute on its platform consolidation strategy, with software subscription revenues now representing 69% of total revenue compared to 61% in the prior year period." },
    { claimIdx:1, after:" Management attributes the improvement to the ongoing shift away from lower-margin hardware and professional services, with the subscription gross margin now tracking above 78%." },
    { text:"Balance Sheet and Capital Allocation" },
    { claimIdx:2, after:" The company generated $31M in free cash flow during the quarter, maintaining its trajectory toward full-year FCF of $80–90M." },
    { text:"Customer Metrics" },
    { claimIdx:3, after:" The cohort of customers acquired in fiscal 2023 now shows NRR of 127%, indicating strong product-market fit in the enterprise segment." },
    { claimIdx:4, after:" Average contract value among new enterprise logos was $184K annually, up from $141K in Q2 2025." },
    { text:"Forward Guidance" },
    { claimIdx:5, after:" The guidance implies second-half revenue of $236–251M, representing 23–31% H2-over-H2 growth." },
    { text:"Strategic Initiatives" },
    { claimIdx:6, after:" The DataBridge platform adds approximately 180 data connectors and a proprietary entity resolution engine." },
    { text:"Market Performance" },
    { claimIdx:7, after:" This outperformance reflects the market’s recognition of Acme’s durable revenue model." },
  ];

  return (
    <>
      <div className="backdrop" onClick={onClose} />
      <div className="slide-panel">
        <div style={{ height:52, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px", borderBottom:"1px solid var(--border)", flexShrink:0 }}>
          <span style={{ fontSize:14, fontWeight:500 }}>Original note</span>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:18, color:"var(--text-faint)", lineHeight:1 }} aria-label="Close">&times;</button>
        </div>
        <div style={{ display:"flex", gap:16, padding:"10px 20px", borderBottom:"1px solid #F3F3EF", flexShrink:0, flexWrap:"wrap" }}>
          {[
            { color:"#2F7D5B", label:"High confidence" },
            { color:"#B8923A", label:"Moderate" },
            { color:"#C2602E", label:"Low" },
            { color:"#A4332B", label:"Disputed" },
          ].map(({ color, label }) => (
            <span key={color} style={{ display:"flex", alignItems:"center", gap:6, fontSize:11, color:"var(--text-muted)" }}>
              <span style={{ width:12, height:2, background:color, display:"inline-block" }} />
              {label}
            </span>
          ))}
        </div>
        <div style={{ flex:1, overflowY:"auto", padding:"20px" }}>
          {paragraphs.map((p, pi) => {
            if (p.heading) {
              return <p key={pi} style={{ fontSize:15, fontWeight:600, color:"var(--text-primary)", marginBottom:16 }}>{p.text}</p>;
            }
            if (p.text) {
              return <p key={pi} style={{ fontSize:13, color:"var(--text-muted)", fontWeight:500, marginBottom:8, textTransform:"uppercase", letterSpacing:".04em" }}>{p.text}</p>;
            }
            const claim = claims[p.claimIdx];
            const color = scoreColor(claim.confidence);
            return (
              <p key={pi} style={{ fontSize:14, color:"var(--text-secondary)", lineHeight:1.65, marginBottom:14 }}>
                <span title={`Claim ${String(claim.index).padStart(2,"0")} \xb7 ${claim.confidence}% confidence`} style={{ borderBottom:`2px solid ${color}` }}>
                  {claim.text}
                </span>
                {p.after}
              </p>
            );
          })}
        </div>
      </div>
    </>
  );
}

function UploadState({ onBack }) {
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"80px 24px" }}>
      <div style={{
        width:"100%", maxWidth:560, height:320, border:"1.5px dashed #D1D5DB",
        borderRadius:10, display:"flex", flexDirection:"column", alignItems:"center",
        justifyContent:"center", gap:8, background:"white",
      }}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" />
        </svg>
        <p style={{ fontSize:14, fontWeight:500, color:"var(--text-secondary)" }}>Drop a PDF or paste text.</p>
        <p style={{ fontSize:13, color:"var(--text-faint)", textAlign:"center", maxWidth:320 }}>
          Memos, 10-Qs, pitch decks, founder updates — up to 50 pages.
        </p>
        <button onClick={onBack} style={{
          marginTop:16, height:32, padding:"0 16px", fontSize:13,
          color:"var(--text-secondary)", background:"white",
          border:"1px solid var(--border)", borderRadius:6,
        }}>
          Back to demo report
        </button>
      </div>
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────────────────

function App() {
  const [filter, setFilter] = useState("all");
  const [sort, setSort] = useState("index");
  const [noteOpen, setNoteOpen] = useState(false);
  const [showUpload, setShowUpload] = useState(false);

  const filtered = useMemo(() => {
    let list = [...CLAIMS];
    if (filter === "disputed") list = list.filter(c => c.confidence < 60 && c.contradicting > 0);
    if (sort === "asc") list.sort((a,b) => a.confidence - b.confidence);
    if (sort === "desc") list.sort((a,b) => b.confidence - a.confidence);
    return list;
  }, [filter, sort]);

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column" }}>
      <TopBar onNew={() => setShowUpload(!showUpload)} />
      {showUpload ? (
        <UploadState onBack={() => setShowUpload(false)} />
      ) : (
        <div className="content-col" style={{ maxWidth:880, margin:"0 auto", width:"100%", padding:"28px 24px 80px" }}>
          {/* Page header */}
          <div style={{ marginBottom:20 }}>
            <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:16, marginBottom:6 }}>
              <h1 style={{ fontSize:22, fontWeight:500, margin:0, color:"var(--text-primary)", lineHeight:1.25 }}>
                {DOC.title}
              </h1>
              <button
                onClick={() => setNoteOpen(true)}
                style={{
                  height:32, padding:"0 12px", fontSize:13, color:"var(--text-secondary)",
                  border:"1px solid var(--border)", background:"white", borderRadius:6,
                  display:"flex", alignItems:"center", gap:6, flexShrink:0,
                }}
              >
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" />
                </svg>
                View original note
              </button>
            </div>
            <p className="mono" style={{ fontSize:13, color:"var(--text-faint)", margin:0 }}>
              Uploaded {DOC.uploaded} · {DOC.words.toLocaleString()} words · {DOC.total} atomic claims
            </p>
          </div>

          {/* Summary bar */}
          <div style={{ marginBottom:20 }}>
            <SummaryBar claims={CLAIMS} />
          </div>

          {/* Filter bar */}
          <FilterBar claims={CLAIMS} active={filter} sort={sort} onFilter={setFilter} onSort={setSort} />

          {/* Claims */}
          <div style={{ display:"flex", flexDirection:"column", gap:16, marginTop:20 }}>
            {filtered.length === 0 ? (
              <p style={{ textAlign:"center", color:"var(--text-faint)", fontSize:14, padding:"40px 0" }}>No claims match this filter.</p>
            ) : (
              filtered.map(claim => <ClaimCard key={claim.id} claim={claim} />)
            )}
          </div>
        </div>
      )}

      <NoteSlideOver open={noteOpen} onClose={() => setNoteOpen(false)} claims={CLAIMS} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
